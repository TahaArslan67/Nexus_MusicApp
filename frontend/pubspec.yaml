name: nexus
description: Nexus Music Player — Serverless, standalone YouTube audio streaming
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  audio_service: ^0.18.15
  flutter:
    sdk: flutter

  # ── Core: YouTube Streaming (Backend yerine direkt) ──────────────
  youtube_explode_dart: ^2.3.9   # YouTube'dan direkt stream + metadata (ytClients desteği)

  just_audio: ^0.9.39             # Audio player
  audio_session: ^0.1.21          # Background playback + audio focus

  # ── Storage (Local-First) ────────────────────────────────────────
  hive: ^2.2.3                   # Local DB (favoriler, cache)
  hive_flutter: ^1.1.0           # Flutter için Hive
  path_provider: ^2.1.3          # Dosya yolları
  shared_preferences: ^2.2.3     # Kullanıcı adı saklama

  # ── State Management ─────────────────────────────────────────────
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # ── Networking ───────────────────────────────────────────────────
  http: ^1.2.1                   # Temel HTTP (thumbnail cache vs.)
  connectivity_plus: ^6.0.3      # İnternet bağlantı kontrolü

  # ── UI ───────────────────────────────────────────────────────────
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  audio_video_progress_bar: ^2.0.2

  # ── Utilities ───────────────────────────────────────────────────
  intl: ^0.19.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
