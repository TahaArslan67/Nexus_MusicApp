services:
  - type: web
    name: nexus-music-api
    runtime: docker
    plan: free
    rootDir: backend
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/nexus.db
    disk:
      name: nexus-data
      mountPath: /app/data
      sizeGB: 1
